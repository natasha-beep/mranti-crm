<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MRANTI CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #060d1f;
      color: #e0f2fe;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(37,99,235,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .logo {
      width: 160px;
      height: 80px;
      background: url("https://cdn.prod.website-files.com/6719e3902a71ea8154ba371d/6996a2c470a01e3f32ffa080_M30.png") center/contain no-repeat;
    }
    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(99, 179, 237, 0.2);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0px 8px 32px 0px rgba(0, 120, 255, 0.15),
                  inset 0 1px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }
    .welcome-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7dd3fc;
    }
    .welcome-title {
      font-size: 26px;
      font-weight: 700;
      color: #e0f2fe;
      line-height: 1.3;
      margin-top: 4px;
    }
    .welcome-sub {
      font-size: 14px;
      color: #7dd3fc;
      margin-top: 4px;
    }
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(99, 179, 237, 0.4);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(99, 179, 237, 0.2);
    }
    .choices {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .choice-btn {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(99, 179, 237, 0.2);
      border-radius: 16px;
      color: #e0f2fe;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .choice-btn:hover {
      background: rgba(37, 99, 235, 0.18);
      border-color: rgba(99, 179, 237, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 120, 255, 0.2);
    }
    .choice-btn:active { transform: translateY(0px); }
    .choice-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .icon-blue { background: rgba(37, 99, 235, 0.25); }
    .icon-teal { background: rgba(20, 184, 166, 0.2); }
    .choice-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }
    .choice-title { font-size: 15px; font-weight: 600; color: #e0f2fe; }
    .choice-desc { font-size: 12px; color: #7dd3fc; }
    .choice-arrow {
      margin-left: auto;
      color: rgba(99, 179, 237, 0.5);
      font-size: 18px;
      flex-shrink: 0;
    }
    .footer {
      font-size: 11px;
      color: rgba(99, 179, 237, 0.35);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"></div>
    <div class="card">
      <span class="welcome-label">MRANTI CRM</span>
      <h1 class="welcome-title">Welcome 👋</h1>
      <p class="welcome-sub">What would you like to do today?</p>
    </div>
    <span class="divider">Choose an action</span>
    <div class="choices">
      <a class="choice-btn" href="https://mrantidata.app.n8n.cloud/form/cf19f1cb-3d2a-42ef-81ea-ab78790b7904" target="_blank">
        <div class="choice-icon icon-blue">🪪</div>
        <div class="choice-text">
          <span class="choice-title">Input Meeting Details</span>
          <span class="choice-desc">Upload a business card or enter contact info</span>
        </div>
        <span class="choice-arrow">›</span>
      </a>
      <a class="choice-btn" href="https://mrantidata.app.n8n.cloud/form/d392dc52-db1b-4c27-8cc5-b075ecc54b1b" target="_blank">
        <div class="choice-icon icon-teal">🔍</div>
        <div class="choice-text">
          <span class="choice-title">Search for a Person</span>
          <span class="choice-desc">Look up saved contacts by name, email, or company</span>
        </div>
        <span class="choice-arrow">›</span>
      </a>
    </div>
    <p class="footer">MRANTI · Malaysian Research Accelerator for Technology & Innovation</p>
  </div>
</body>
</html>
